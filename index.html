<!doctype html> <!-- Declaração do tipo de documento HTML5 -->

<html lang="pt-BR"> <!-- Início do documento HTML, com o idioma definido como português do Brasil -->
    
<head> <!-- Início da seção de cabeçalho do documento -->
<meta charset = "UTF-8" > <!-- Define a codificação de caracteres como UTF-8 -->
<title> Portifolio - Caroline Ferreira </title> <!-- Define o título da página como "Portifolio - Caroline Ferreira" -->
<link rel = "stylesheet" href = "style.css" /> <!-- Link para o arquivo de estilo CSS chamado "style.css" -->
</head> <!-- Fim da seção de cabeçalho -->

<body> <!-- Início do corpo do documento -->
<header> <!-- Início da seção de cabeçalho da página -->
    <div class = "logo"> Caroline Ferreira </div> <!-- Div com a classe "logo" que contém o nome "Caroline Ferreira" -->
           
    <div class = "social"> <!-- Div com a classe "social" que contém os links para as redes sociais -->
        <a href = "https://www.instagram.com/carolferreirauai/" target = "_blank">  <!-- Link para perfil do instagram -->
            <img width = "40" height = "40" src = "https://img.icons8.com/fluency-systems-regular/48/instagram-new--v1.png" alt = "instagram-nev--v1"/> <!-- Imagem do ícone do Instagram -->
            </a> <!-- Fim do link para o Instagram -->

        <a href = "https://www.linkedin.com/in/carolineferreiradesouza/" target = "_blank"> <!-- Link para perfil do LinkedIn -->
            <img width = "40" height = "40" src = "https://img.icons8.com/ios-filled/50/linkedin.png" alt = "linkedin"/> <!-- Imagem do ícone do LinkedIn -->
                </a> <!-- Fim do link para o LinkedIn -->
                
        <a href = "tel:35999-9999"> <!-- Link para realizar uma chamada telefônica -->
            <img width = "40" height = "40" src = "https://img.icons8.com/ios-filled/50/phone.png" alt = "phone"/> <!-- Imagem do ícone de telefone -->
                </a> <!-- Fim do link para telefone -->
                
        <a href = "#" class = "btn" >Fala Comigo</a> <!-- Link com a classe "btn" que contém o texto "Fala Comigo" -->
    </div> <!-- Fim da div de redes sociais -->
</header> <!-- Fim da seção de cabeçalho da página -->

<main> <!-- Início da seção principal do documento -->
    <div class = "content"> <!-- Div com a classe "content" que contém o conteúdo principal da página -->
        <h1> <!-- Título principal da página -->
            Front end <br /> <!-- Quebra de linha para separar "Front end" e "Developer" -->
            <span> Developer </span> <!-- A palavra "Developer" está envolvida em uma tag <span>, que pode ser estilizada de forma diferente usando CSS -->
        </h1> <!-- Fim do título principal -->
        <p> Hello World! </p> <!-- Parágrafo com o texto "Hello World!" -->
    </div> <!-- Fim da div de conteúdo principal -->

    <div class = "image"> <!-- Div com a classe "image" que contém uma imagem -->
        <img src = "src/img.webp" alt = "img" /> <!-- Imagem com a fonte "src/img.webp" e texto alternativo "img" -->
    </div> <!-- Fim da div de imagem -->
</main> <!-- Fim da seção principal -->

<footer> <!-- Início da seção de rodapé do documento -->
    <p> Copyright @ 2026 - Caroline Ferreira</p> <!-- Parágrafo com o texto de copyright -->
</footer> <!-- Fim da seção de rodapé -->

</body> <!-- Fim do corpo do documento -->
</html> <!-- Fim do documento HTML -->
